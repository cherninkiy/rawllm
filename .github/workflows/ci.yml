name: CI

on:
  push:
    branches:
      - main
      - core/architecture
      - copilot/core-architecture
  pull_request:
    branches:
      - main
      - core/architecture

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest tests/ -v --timeout=30 --cov=core --cov-fail-under=90

      - name: Run flake8
        run: flake8 core/ plugins/ run.py --max-line-length=120 --ignore=E501,W503

      - name: Run mypy (optional)
        run: mypy core/ run.py --ignore-missing-imports || true
